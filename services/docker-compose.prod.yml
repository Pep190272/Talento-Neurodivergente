services:
  db:
    image: postgres:16-alpine
    container_name: diversia-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diversia_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diversia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-diversia_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
    ports:
      - "0.0.0.0:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diversia_admin} -d ${POSTGRES_DB:-diversia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
      - default

  ollama:
    image: ollama/ollama:latest
    container_name: diversia-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 5G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 30s
      retries: 5
    networks:
      - dokploy-network
      - default

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: diversia-auth
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-diversia_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diversia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-diversia_db}
      JWT_SECRET: ${JWT_SECRET:-diversia-dev-secret-change-in-production}
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
      - default

  profile-service:
    build:
      context: .
      dockerfile: profile-service/Dockerfile
    container_name: diversia-profile
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-diversia_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diversia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-diversia_db}
      JWT_SECRET: ${JWT_SECRET:-diversia-dev-secret-change-in-production}
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
      - default

  matching-service:
    build:
      context: .
      dockerfile: matching-service/Dockerfile
    container_name: diversia-matching
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-diversia_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diversia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-diversia_db}
      JWT_SECRET: ${JWT_SECRET:-diversia-dev-secret-change-in-production}
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
      - default

  intelligence-service:
    build:
      context: .
      dockerfile: intelligence-service/Dockerfile
    container_name: diversia-intelligence
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-diversia_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diversia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-diversia_db}
      JWT_SECRET: ${JWT_SECRET:-diversia-dev-secret-change-in-production}
      OLLAMA_URL: http://ollama:11434
      ENV: production
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network
      - default

  gateway:
    image: nginx:alpine
    container_name: diversia-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      matching-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
      - default

networks:
  dokploy-network:
    external: true

volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local
