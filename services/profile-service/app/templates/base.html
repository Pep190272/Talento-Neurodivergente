<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DiversIA Eternals{% endblock %}</title>
  <meta name="description" content="{% block description %}Plataforma de matching trilateral para talento neurodivergente{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (compiled) + custom styles -->
  <link rel="stylesheet" href="/static/css/styles.css">

  <!-- Alpine.js -->
  <script defer src="/static/js/vendor/alpine.3.14.8.min.js"></script>
  <!-- Lucide icons -->
  <script src="/static/js/vendor/lucide.0.469.0.min.js"></script>
  <!-- Chart.js -->
  <script src="/static/js/vendor/chart.4.4.7.umd.min.js"></script>

  {% block head %}{% endblock %}
</head>
<body class="font-body bg-white text-dark antialiased" x-data x-init="$store.auth.init()">

  {% include "partials/navbar.html" %}

  <!-- Toast notification -->
  <div class="toast" :class="[$store.toast.visible ? 'show' : '', 'toast-' + $store.toast.type]"
       x-text="$store.toast.message"></div>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script src="/static/js/app.js"></script>
  <script>lucide.createIcons();</script>
  {% block scripts %}{% endblock %}
</body>
</html>
