<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <script>
    // Despacho 6: Apply high contrast mode immediately to prevent flash
    (function() {
      var hc = localStorage.getItem('diversia_high_contrast') === 'true'
               || window.matchMedia('(prefers-contrast: more)').matches;
      if (hc) document.documentElement.classList.add('high-contrast');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DiversIA Eternals{% endblock %}</title>
  <meta name="description" content="{% block description %}Plataforma de matching trilateral para talento neurodivergente{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS (compiled) + custom styles -->
  <link rel="stylesheet" href="/static/css/styles.css">
  <!-- WCAG AAA Accessibility + High Contrast Mode (Despacho 6) -->
  <link rel="stylesheet" href="/static/css/app.css">

  <!-- Alpine.js -->
  <script defer src="/static/js/vendor/alpine.3.14.8.min.js"></script>
  <!-- Lucide icons -->
  <script src="/static/js/vendor/lucide.0.469.0.min.js"></script>
  <!-- Chart.js -->
  <script src="/static/js/vendor/chart.4.4.7.umd.min.js"></script>

  {% block head %}{% endblock %}
</head>
<body class="font-body bg-white text-dark antialiased" x-data x-init="$store.auth.init()">

  <!-- Skip to content link for screen readers -->
  <a href="#main-content" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" onfocus="this.style.position='static';this.style.width='auto';this.style.height='auto';" onblur="this.style.position='absolute';this.style.left='-9999px';this.style.width='1px';this.style.height='1px';">
    Saltar al contenido principal
  </a>

  {% include "partials/navbar.html" %}

  <!-- Toast notification -->
  <div class="toast" :class="[$store.toast.visible ? 'show' : '', 'toast-' + $store.toast.type]"
       x-text="$store.toast.message" role="alert" aria-live="assertive"></div>

  <main id="main-content" role="main">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script src="/static/js/app.js"></script>
  <script>lucide.createIcons();</script>
  {% block scripts %}{% endblock %}
</body>
</html>
