{% extends "base.html" %}
{% block title %}Recuperar Contraseña — DiversIA{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md" x-data="forgotPasswordForm()">
    <div class="text-center mb-8">
      <h1 class="font-display text-2xl font-bold text-dark">Recuperar Contraseña</h1>
      <p class="text-gray-500 mt-2">Te enviaremos un enlace para restablecer tu contraseña</p>
    </div>

    <form @submit.prevent="submit" class="glass rounded-xl p-8 space-y-5">
      <!-- Error -->
      <div x-show="error" x-cloak class="p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg" x-text="error"></div>

      <!-- Success -->
      <div x-show="success" x-cloak class="p-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg" x-text="success"></div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" x-model="email" required
               class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none"
               placeholder="tu@email.com"
               :disabled="loading">
      </div>

      <button type="submit" :disabled="loading"
              class="w-full py-2.5 bg-primary text-white font-semibold rounded-lg hover:bg-primary-deep transition disabled:opacity-50 flex items-center justify-center gap-2">
        <span x-show="loading" class="spinner"></span>
        <span x-text="loading ? 'Enviando...' : 'Enviar enlace de recuperación'"></span>
      </button>

      <p class="text-center text-sm text-gray-500">
        <a href="/login" class="text-primary font-medium hover:underline">Volver a Iniciar Sesión</a>
      </p>
    </form>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
function forgotPasswordForm() {
  return {
    email: '', error: '', success: '', loading: false,
    async submit() {
      this.error = '';
      this.success = '';
      this.loading = true;
      try {
        const res = await fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: this.email }),
        });
        const data = await res.json();
        if (!res.ok) {
          this.error = data.detail || data.message || 'Error al procesar la solicitud';
        } else {
          this.success = data.message || 'Si el email existe en nuestro sistema, recibirás un enlace para restablecer tu contraseña.';
        }
      } catch (e) {
        this.error = 'Error de conexión. Inténtalo de nuevo.';
      } finally {
        this.loading = false;
      }
    }
  }
}
</script>
{% endblock %}
