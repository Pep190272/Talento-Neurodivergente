{% extends "base.html" %}
{% block title %}Dashboard — DiversIA{% endblock %}

{% block content %}
<section class="py-8 px-4" x-data="dashboardApp()" x-init="init()">
  <div class="max-w-7xl mx-auto">

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-20">
      <div class="spinner"></div>
    </div>

    <div x-show="!loading" x-cloak>

      <!-- Header -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
        <div>
          <h1 class="font-display text-2xl font-bold text-dark">
            Hola, <span x-text="$store.auth.user?.display_name || $store.auth.user?.email || 'Usuario'"></span>
          </h1>
          <p class="text-gray-700 mt-1 leading-relaxed">
            <span x-text="roleLabel()"></span> &middot; DiversIA Eternals
          </p>
        </div>
        <div class="flex items-center gap-2">
          <span class="px-3 py-1.5 text-xs font-bold rounded-full"
                :class="profile ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
                x-text="profile ? 'Perfil activo' : 'Perfil pendiente'"></span>
          <span class="px-3 py-1.5 text-xs font-bold rounded-full bg-blue-100 text-blue-700">
            <i data-lucide="shield-check" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i> GDPR
          </span>
        </div>
      </div>

      <!-- ==================== CANDIDATE DASHBOARD ==================== -->
      <template x-if="$store.auth.role === 'candidate'">
        <div>
          <!-- Progress bar -->
          <div class="glass rounded-xl p-6 mb-6 shadow-md" role="region" aria-label="Progreso del perfil">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-base font-bold text-dark">Progreso del perfil</h2>
              <span class="text-base font-bold text-primary" x-text="progressPct() + '%'"></span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5" role="progressbar" :aria-valuenow="progressPct()" aria-valuemin="0" aria-valuemax="100">
              <div class="bg-primary h-2.5 rounded-full transition-all duration-500"
                   :style="'width:' + progressPct() + '%'"></div>
            </div>
            <div class="flex justify-between mt-3 text-sm text-gray-700">
              <span :class="profile ? 'text-green-700 font-medium' : ''">
                <i data-lucide="user" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i> Perfil
              </span>
              <span :class="hasQuiz ? 'text-green-700 font-medium' : ''">
                <i data-lucide="brain" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i> Quiz 24D
              </span>
              <span :class="hasGames ? 'text-green-700 font-medium' : 'text-gray-600'">
                <i data-lucide="gamepad-2" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i> Brain Suite
              </span>
              <span class="text-gray-600">
                <i data-lucide="handshake" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i> Matching
              </span>
            </div>
          </div>

          <!-- Main grid: Chart + Profile -->
          <div class="grid lg:grid-cols-5 gap-6 mb-6">

            <!-- 24D Radar Chart (3 cols) -->
            <div class="lg:col-span-3 glass rounded-xl p-6 shadow-md">
              <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-xl text-dark">
                  <i data-lucide="brain" class="w-5 h-5 inline text-primary icon-accessible" aria-hidden="true"></i>
                  Perfil Neurocognitivo 24D
                </h2>
                <template x-if="!hasQuiz">
                  <a href="/quiz" class="text-sm text-primary font-medium hover:underline touch-target">Realizar quiz &rarr;</a>
                </template>
              </div>

              <template x-if="hasQuiz">
                <div>
                  <div class="relative" style="max-height: 400px;">
                    <canvas id="radarChart" aria-label="Grafico radar del perfil neurocognitivo 24D" role="img"></canvas>
                  </div>
                  <p class="text-sm text-gray-700 mt-3 text-center leading-relaxed">
                    Valores de 0 (bajo) a 1 (alto) &middot; No hay respuestas buenas ni malas
                  </p>
                </div>
              </template>

              <template x-if="!hasQuiz">
                <div class="flex flex-col items-center justify-center py-12 text-center">
                  <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4">
                    <i data-lucide="brain" class="w-8 h-8 text-primary" aria-hidden="true"></i>
                  </div>
                  <h3 class="font-bold text-lg mb-2">Quiz no realizado</h3>
                  <p class="text-base text-gray-700 mb-4 max-w-sm leading-relaxed">
                    Completa la evaluacion de 24 dimensiones cognitivas para generar tu perfil neurodivergente.
                  </p>
                  <a href="/quiz"
                     class="px-5 py-2.5 bg-primary text-white text-base font-semibold rounded-lg hover:bg-primary-deep transition touch-target">
                    Empezar Quiz
                  </a>
                </div>
              </template>
            </div>

            <!-- Profile card + stats (2 cols) -->
            <div class="lg:col-span-2 space-y-6">

              <!-- Profile info -->
              <div class="glass rounded-xl p-6 shadow-md">
                <h3 class="font-bold text-sm text-gray-700 uppercase tracking-wider mb-4">Tu Perfil</h3>
                <template x-if="profile">
                  <div class="space-y-3">
                    <div class="flex items-center gap-3">
                      <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
                        <span class="text-primary font-display font-bold text-lg"
                              x-text="(profile.display_name || '?')[0].toUpperCase()"></span>
                      </div>
                      <div>
                        <p class="font-semibold text-dark" x-text="profile.display_name"></p>
                        <p class="text-sm text-gray-600" x-text="$store.auth.user?.email"></p>
                      </div>
                    </div>
                    <div class="border-t border-gray-200 pt-3 space-y-2 text-base">
                      <div class="flex justify-between" x-show="profile.location">
                        <span class="text-gray-700">Ubicacion</span>
                        <span class="font-medium text-dark" x-text="profile.location"></span>
                      </div>
                      <div class="flex justify-between" x-show="profile.bio">
                        <span class="text-gray-700">Bio</span>
                        <span class="font-medium truncate ml-4 max-w-[150px] text-dark" x-text="profile.bio"></span>
                      </div>
                      <div class="flex justify-between">
                        <span class="text-gray-700">Estado</span>
                        <span class="px-2 py-0.5 text-xs font-bold rounded-full bg-green-100 text-green-700"
                              x-text="profile.status || 'active'"></span>
                      </div>
                    </div>
                    <a href="/forms" class="block text-center text-sm text-primary font-medium hover:underline mt-2 touch-target">
                      Editar perfil &rarr;
                    </a>
                  </div>
                </template>
                <template x-if="!profile">
                  <div class="text-center py-4">
                    <p class="text-base text-gray-700 mb-3 leading-relaxed">Aun no has creado tu perfil</p>
                    <a href="/forms"
                       class="px-4 py-2 bg-primary text-white text-base rounded-lg hover:bg-primary-deep transition touch-target">
                      Crear Perfil
                    </a>
                  </div>
                </template>
              </div>

              <!-- Top dimensions -->
              <div class="glass rounded-xl p-6 shadow-md" x-show="hasQuiz">
                <h3 class="font-bold text-sm text-gray-700 uppercase tracking-wider mb-4">Fortalezas Principales</h3>
                <div class="space-y-3">
                  <template x-for="dim in topDimensions" :key="dim.key">
                    <div>
                      <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700" x-text="dimLabels[dim.key] || dim.key"></span>
                        <span class="font-semibold text-primary" x-text="Math.round(dim.value * 100) + '%'"></span>
                      </div>
                      <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div class="bg-primary h-1.5 rounded-full" :style="'width:' + (dim.value * 100) + '%'"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Growth areas -->
              <div class="glass rounded-xl p-6 shadow-md" x-show="hasQuiz">
                <h3 class="font-bold text-sm text-gray-700 uppercase tracking-wider mb-4">Areas de Crecimiento</h3>
                <div class="space-y-3">
                  <template x-for="dim in bottomDimensions" :key="dim.key">
                    <div>
                      <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700" x-text="dimLabels[dim.key] || dim.key"></span>
                        <span class="font-semibold text-amber-600" x-text="Math.round(dim.value * 100) + '%'"></span>
                      </div>
                      <div class="w-full bg-gray-200 rounded-full h-1.5">
                        <div class="bg-amber-400 h-1.5 rounded-full" :style="'width:' + (dim.value * 100) + '%'"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- Dimension breakdown by category -->
          <div class="glass rounded-xl p-6 mb-6 shadow-md" x-show="hasQuiz">
            <h2 class="font-bold text-xl text-dark mb-4">
              <i data-lucide="bar-chart-3" class="w-5 h-5 inline text-primary icon-accessible" aria-hidden="true"></i>
              Desglose por Categoria
            </h2>
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <template x-for="cat in categories" :key="cat.name">
                <div class="border border-gray-200 rounded-lg p-4 shadow-sm">
                  <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" :class="cat.bgColor">
                      <i :data-lucide="cat.icon" class="w-4 h-4 icon-accessible" :class="cat.iconColor" aria-hidden="true"></i>
                    </div>
                    <div>
                      <h4 class="text-base font-bold text-dark" x-text="cat.name"></h4>
                      <p class="text-sm text-gray-700" x-text="Math.round(cat.avg * 100) + '% promedio'"></p>
                    </div>
                  </div>
                  <div class="space-y-2">
                    <template x-for="dim in cat.dims" :key="dim.key">
                      <div class="flex items-center gap-2">
                        <div class="flex-1">
                          <div class="text-sm text-gray-700 truncate" x-text="dimLabels[dim.key] || dim.key"></div>
                        </div>
                        <div class="w-16 bg-gray-200 rounded-full h-1.5">
                          <div class="h-1.5 rounded-full" :class="cat.barColor"
                               :style="'width:' + (dim.value * 100) + '%'"></div>
                        </div>
                        <span class="text-sm font-medium w-8 text-right text-dark" x-text="Math.round(dim.value * 100)"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Recent Messages Widget (Despacho 4, #138) -->
          <div class="glass rounded-xl p-6 mb-6 shadow-md" role="region" aria-label="Mensajes recientes">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-lg text-dark">
                <i data-lucide="message-circle" class="w-5 h-5 inline text-primary icon-accessible" aria-hidden="true"></i>
                Mensajes Recientes
              </h2>
              <a href="/messages" class="text-sm text-primary font-medium hover:underline touch-target">Ver todos &rarr;</a>
            </div>
            <template x-if="recentConversations.length === 0">
              <div class="text-center py-4">
                <p class="text-base text-gray-700 leading-relaxed">No tienes mensajes aun</p>
                <p class="text-sm text-gray-700 mt-1">Los mensajes apareceran aqui cuando inicies una conversacion</p>
              </div>
            </template>
            <div class="space-y-2">
              <template x-for="conv in recentConversations" :key="conv.id">
                <a :href="'/messages?with=' + (conv.participant_1_id === userId ? conv.participant_2_id : conv.participant_1_id)"
                   class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 transition touch-target">
                  <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
                    <i data-lucide="user" class="w-4 h-4 text-primary icon-accessible" aria-hidden="true"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-base font-medium truncate text-dark"
                       x-text="'Usuario ' + (conv.participant_1_id === userId ? conv.participant_2_id : conv.participant_1_id).substring(0, 6)"></p>
                    <p class="text-sm text-gray-700 truncate" x-text="conv.last_message_preview || 'Sin mensajes'"></p>
                  </div>
                  <div x-show="conv.unread_count > 0"
                       class="w-5 h-5 rounded-full bg-primary text-white text-xs flex items-center justify-center shrink-0"
                       x-text="conv.unread_count"></div>
                </a>
              </template>
            </div>
          </div>

          <!-- Quick Actions row -->
          <div class="grid sm:grid-cols-3 gap-4 mb-6">
            <a href="/quiz" class="glass rounded-xl p-6 hover-lift hover:border-primary transition flex items-center gap-4 shadow-md touch-target"
               :class="hasQuiz ? 'opacity-60' : 'border-2 border-primary/30'">
              <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                <i data-lucide="brain" class="w-5 h-5 text-primary icon-accessible" aria-hidden="true"></i>
              </div>
              <div>
                <h3 class="font-semibold text-base text-dark" x-text="hasQuiz ? 'Repetir Quiz' : 'Hacer Quiz 24D'"></h3>
                <p class="text-sm text-gray-700" x-text="hasQuiz ? 'Ya completado' : '5-10 min · 24 preguntas'"></p>
              </div>
            </a>

            <a href="/games" class="glass rounded-xl p-6 hover-lift hover:border-purple-400 transition flex items-center gap-4 shadow-md touch-target">
              <div class="w-10 h-10 rounded-lg bg-purple-100 flex items-center justify-center shrink-0">
                <i data-lucide="gamepad-2" class="w-5 h-5 text-purple-600 icon-accessible" aria-hidden="true"></i>
              </div>
              <div>
                <h3 class="font-semibold text-base text-dark">Brain Suite</h3>
                <p class="text-sm text-gray-700" x-text="hasGames ? totalPlays + ' partidas jugadas' : '3 juegos disponibles'"></p>
              </div>
            </a>

            <a href="/messages" class="glass rounded-xl p-6 hover-lift hover:border-primary transition flex items-center gap-4 shadow-md touch-target">
              <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                <i data-lucide="message-circle" class="w-5 h-5 text-primary icon-accessible" aria-hidden="true"></i>
              </div>
              <div>
                <h3 class="font-semibold text-base text-dark">Mensajes</h3>
                <p class="text-sm text-gray-700">Chat privado con actores</p>
              </div>
            </a>
          </div>

          <!-- Matching section -->
          <div class="glass rounded-xl p-6 shadow-md">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-xl text-dark">
                <i data-lucide="handshake" class="w-5 h-5 inline text-primary icon-accessible" aria-hidden="true"></i>
                Empleos Compatibles
              </h2>
              <a href="/jobs" class="text-sm text-primary font-medium hover:underline touch-target">Ver todos &rarr;</a>
            </div>

            <template x-if="matchedJobs.length === 0 && !hasQuiz">
              <div class="text-center py-6">
                <p class="text-base text-gray-700 mb-3 leading-relaxed">Completa el quiz 24D para que nuestro algoritmo encuentre empleos compatibles con tu perfil.</p>
                <a href="/quiz" class="px-4 py-2 bg-primary text-white text-base rounded-lg hover:bg-primary-deep transition touch-target">Hacer Quiz</a>
              </div>
            </template>

            <template x-if="matchedJobs.length === 0 && hasQuiz">
              <div class="text-center py-6">
                <p class="text-base text-gray-700 leading-relaxed">No hay ofertas publicadas aun. Las empresas estan en proceso de onboarding.</p>
              </div>
            </template>

            <div class="space-y-3">
              <template x-for="job in matchedJobs.slice(0, 3)" :key="job.id">
                <div class="border border-gray-200 rounded-lg p-4 hover:border-primary/30 transition shadow-sm">
                  <div class="flex items-start justify-between gap-3">
                    <div class="flex-1">
                      <div class="flex items-center gap-2 mb-1">
                        <h4 class="font-semibold text-base text-dark" x-text="job.title"></h4>
                        <span class="px-2 py-0.5 text-xs font-bold rounded-full"
                              :class="job.match.pct >= 70 ? 'bg-green-100 text-green-700' : job.match.pct >= 50 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700'"
                              x-text="job.match.pct + '%'"></span>
                      </div>
                      <div class="flex items-center gap-2 text-sm text-gray-700">
                        <span x-show="job.company_name" x-text="job.company_name"></span>
                        <span x-show="job.location">· <span x-text="job.location"></span></span>
                        <span>· <span x-text="{'remote':'Remoto','hybrid':'Hibrido','onsite':'Presencial'}[job.modality] || job.modality"></span></span>
                      </div>
                      <div x-show="job.match.reasons && job.match.reasons.length > 0" class="mt-1">
                        <p class="text-sm text-green-700 font-medium" x-text="job.match.reasons[0]"></p>
                      </div>
                    </div>
                    <div x-show="job.adaptations && job.adaptations.length > 0" class="text-right shrink-0">
                      <span class="text-sm text-green-700 font-medium">
                        <i data-lucide="heart" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i>
                        <span x-text="job.adaptations.length"></span> adaptacion(es)
                      </span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- ==================== COMPANY DASHBOARD ==================== -->
      <template x-if="$store.auth.role === 'company'">
        <div>
          <!-- KPI Cards -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-6 hover-lift shadow-md actor-company-accent">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-700 font-bold uppercase tracking-wider">Perfil</span>
                <i data-lucide="building-2" class="w-5 h-5 text-green-600 icon-accessible" aria-hidden="true"></i>
              </div>
              <div class="text-2xl font-display font-bold" :class="profile ? 'text-green-600' : 'text-gray-600'"
                   x-text="profile ? 'Activo' : 'Pendiente'"></div>
            </div>
            <div class="glass rounded-xl p-6 hover-lift shadow-md actor-company-accent">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-700 font-bold uppercase tracking-wider">Inclusividad</span>
                <i data-lucide="heart" class="w-5 h-5 text-pink-600 icon-accessible" aria-hidden="true"></i>
              </div>
              <template x-if="hasInclusivity">
                <div>
                  <div class="text-2xl font-display font-bold"
                       :class="inclusivityOverall >= 75 ? 'text-green-600' : inclusivityOverall >= 50 ? 'text-yellow-600' : 'text-red-600'"
                       x-text="inclusivityOverall + '%'"></div>
                  <p class="text-sm text-gray-700 mt-1">Score global</p>
                </div>
              </template>
              <template x-if="!hasInclusivity">
                <div>
                  <div class="text-2xl font-display font-bold text-gray-600">-</div>
                  <p class="text-sm text-gray-700 mt-1">Evaluacion pendiente</p>
                </div>
              </template>
            </div>
            <div class="glass rounded-xl p-6 hover-lift shadow-md actor-company-accent">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-700 font-bold uppercase tracking-wider">Candidatos</span>
                <i data-lucide="users" class="w-5 h-5 text-primary icon-accessible" aria-hidden="true"></i>
              </div>
              <div class="text-2xl font-display font-bold text-gray-600">-</div>
              <p class="text-sm text-gray-700 mt-1">Proximamente</p>
            </div>
            <div class="glass rounded-xl p-6 hover-lift shadow-md actor-company-accent">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm text-gray-700 font-bold uppercase tracking-wider">Seguridad</span>
                <i data-lucide="shield-check" class="w-5 h-5 text-green-600 icon-accessible" aria-hidden="true"></i>
              </div>
              <div class="text-2xl font-display font-bold text-green-600">GDPR</div>
              <p class="text-sm text-gray-700 mt-1">Datos en EU</p>
            </div>
          </div>

          <!-- Subscription / Early Adopter Banner -->
          <div class="glass rounded-xl p-6 mb-6 border-2 border-amber-200 bg-gradient-to-r from-amber-50 to-yellow-50 shadow-md">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center shrink-0">
                  <i data-lucide="crown" class="w-6 h-6 text-amber-600 icon-accessible" aria-hidden="true"></i>
                </div>
                <div>
                  <div class="flex items-center gap-2 mb-1">
                    <h3 class="font-bold text-xl text-amber-900">Plan Early Adopter</h3>
                    <span class="px-2 py-0.5 text-xs font-bold rounded-full bg-amber-200 text-amber-800"
                          x-text="subscription ? subscription.plan_name : 'PRO'"></span>
                  </div>
                  <p class="text-base text-amber-800 leading-relaxed" x-show="subscription && subscription.is_early_adopter">
                    Activo hasta <span x-text="subscription ? new Date(subscription.current_period_end).toLocaleDateString('es-ES') : ''"></span>
                    &mdash; <strong>Gratis</strong> como Early Adopter
                  </p>
                  <p class="text-base text-amber-800 leading-relaxed" x-show="!subscription || !subscription.is_early_adopter">
                    Como uno de los primeros en registrarse, tienes el plan PRO gratis durante 3 meses.
                    Se ha activado automaticamente, no necesitas codigo.
                  </p>
                </div>
              </div>
              <div class="text-right shrink-0">
                <span class="inline-block px-3 py-1.5 text-xs font-bold rounded-lg bg-green-100 text-green-700">
                  <i data-lucide="check-circle" class="w-4 h-4 inline icon-accessible" aria-hidden="true"></i>
                  Activo
                </span>
              </div>
            </div>
          </div>

          <!-- Inclusivity breakdown chart - Chart.js -->
          <div x-show="hasInclusivity" class="glass rounded-xl p-6 mb-6 shadow-md">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-xl text-dark">
                <i data-lucide="heart" class="w-5 h-5 inline text-pink-600 icon-accessible" aria-hidden="true"></i>
                Score de Inclusividad
              </h2>
              <a href="/inclusivity" class="text-sm text-green-700 font-medium hover:underline touch-target">Repetir evaluacion &rarr;</a>
            </div>
            <div class="relative" style="max-height: 320px;">
              <canvas id="companyInclusivityChart" aria-label="Grafico de barras del score de inclusividad" role="img"></canvas>
            </div>
            <p class="text-sm text-gray-700 mt-3 text-center leading-relaxed">
              Score global: <span class="font-bold" x-text="inclusivityOverall + '%'"></span> &middot;
              Hover sobre las barras para ver detalles
            </p>
          </div>

          <!-- Quick Actions -->
          <div class="grid sm:grid-cols-3 gap-4 mb-6">
            <a href="/forms" class="glass rounded-xl p-6 hover-lift hover:border-green-400 transition flex items-center gap-4 shadow-md touch-target">

<script>
function matchingHub() {
  return {
    hoveredNode: null,
    scrollToSection(sectionId) {
      const el = document.getElementById(sectionId);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // Brief highlight effect
        el.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
        setTimeout(() => el.classList.remove('ring-2', 'ring-primary', 'ring-offset-2'), 2000);
      }
    }
  };
}

function dashboardApp() {
  // Human-readable labels for each 24D dimension
  const dimLabels = {
    attention_sustained: 'Atencion sostenida',
    attention_selective: 'Atencion selectiva',
    attention_divided: 'Atencion dividida',
    memory_working: 'Memoria de trabajo',
    memory_short_term: 'Memoria a corto plazo',
    memory_long_term: 'Memoria a largo plazo',
    processing_speed: 'Velocidad de proceso',
    processing_accuracy: 'Precision',
    processing_visual: 'Proceso visual',
    executive_planning: 'Planificacion',
    executive_flexibility: 'Flexibilidad',
    executive_inhibition: 'Inhibicion',
    social_communication: 'Comunicacion',
    social_empathy: 'Empatia',
    social_collaboration: 'Colaboracion',
    creativity_divergent: 'Pensamiento divergente',
    creativity_pattern: 'Deteccion patrones',
    creativity_innovation: 'Innovacion',
    sensory_visual: 'Sens. visual',
    sensory_auditory: 'Sens. auditiva',
    sensory_tactile: 'Sens. tactil',
    emotional_regulation: 'Regulacion emocional',
    emotional_awareness: 'Conciencia emocional',
    emotional_resilience: 'Resiliencia',
  };

  // Category definitions: 8 groups x 3 dimensions
  const categoryDefs = [
    { name: 'Atencion', icon: 'eye', bgColor: 'bg-blue-100', iconColor: 'text-blue-600', barColor: 'bg-blue-500',
      keys: ['attention_sustained', 'attention_selective', 'attention_divided'] },
    { name: 'Memoria', icon: 'database', bgColor: 'bg-indigo-100', iconColor: 'text-indigo-600', barColor: 'bg-indigo-500',
      keys: ['memory_working', 'memory_short_term', 'memory_long_term'] },
    { name: 'Procesamiento', icon: 'zap', bgColor: 'bg-cyan-100', iconColor: 'text-cyan-600', barColor: 'bg-cyan-500',
      keys: ['processing_speed', 'processing_accuracy', 'processing_visual'] },
    { name: 'Funcion Ejecutiva', icon: 'target', bgColor: 'bg-green-100', iconColor: 'text-green-600', barColor: 'bg-green-500',
      keys: ['executive_planning', 'executive_flexibility', 'executive_inhibition'] },
    { name: 'Social', icon: 'users', bgColor: 'bg-pink-100', iconColor: 'text-pink-600', barColor: 'bg-pink-500',
      keys: ['social_communication', 'social_empathy', 'social_collaboration'] },
    { name: 'Creatividad', icon: 'lightbulb', bgColor: 'bg-amber-100', iconColor: 'text-amber-600', barColor: 'bg-amber-500',
      keys: ['creativity_divergent', 'creativity_pattern', 'creativity_innovation'] },
    { name: 'Sensorial', icon: 'radio', bgColor: 'bg-purple-100', iconColor: 'text-purple-600', barColor: 'bg-purple-500',
      keys: ['sensory_visual', 'sensory_auditory', 'sensory_tactile'] },
    { name: 'Emocional', icon: 'heart', bgColor: 'bg-red-100', iconColor: 'text-red-600', barColor: 'bg-red-500',
      keys: ['emotional_regulation', 'emotional_awareness', 'emotional_resilience'] },
  ];

  // Demo data for admin dashboard
  const demoVector = {
    attention: 0.85, memory: 0.72, processing_speed: 0.68,
    pattern_recognition: 0.91, creative_thinking: 0.88, analytical_thinking: 0.75,
    verbal_reasoning: 0.62, spatial_reasoning: 0.79,
    communication_style: 0.55, teamwork: 0.60, leadership: 0.45, conflict_resolution: 0.50,
    task_switching: 0.40, deadline_management: 0.58, autonomy: 0.82, structure_need: 0.70,
    sensory_sensitivity: 0.78, stress_tolerance: 0.52,
    domain_expertise: 0.80, learning_speed: 0.87, problem_solving: 0.90,
    detail_orientation: 0.83, abstract_thinking: 0.76, technical_depth: 0.85,
  };

  return {
    profile: null,
    subscription: null,
    gameScores: {},
    matchedJobs: [],
    loading: true,
    dimLabels,
    topDimensions: [],
    bottomDimensions: [],
    categories: [],
    recentConversations: [],
    userId: '',
    radarChart: null,
    adminRadarChart: null,
    userDistributionChart: null,
    registrationTimelineChart: null,
    brainSuiteChart: null,
    inclusivityBarChart: null,
    companyInclusivityChart: null,
    adminStats: {},
    adminJobCount: '-',

    get demoStrengths() {
      return [
        { label: 'Deteccion de patrones', pct: 91 },
        { label: 'Resolucion de problemas', pct: 90 },
        { label: 'Pensamiento creativo', pct: 88 },
        { label: 'Velocidad de aprendizaje', pct: 87 },
        { label: 'Atencion sostenida', pct: 85 },
      ];
    },

    get demoJobs() {
      return [
        { title: 'Data Scientist', company: 'TechInclusion SL', location: 'Remoto', pct: 87, reason: 'Tu deteccion de patrones es clave' },
        { title: 'UX Researcher', company: 'NeuroDev Labs', location: 'Barcelona', pct: 78, reason: 'Tu pensamiento creativo destaca' },
        { title: 'Backend Developer', company: 'AccessiTech', location: 'Madrid', pct: 72, reason: 'Tu atencion sostenida se alinea' },
      ];
    },

    get demoInclusivity() {
      return [
        { label: 'Entorno sensorial', pct: 80 },
        { label: 'Cultura y comunicacion', pct: 75 },
        { label: 'Procesos de seleccion', pct: 65 },
        { label: 'Adaptaciones laborales', pct: 82 },
        { label: 'Formacion', pct: 55 },
        { label: 'Medicion', pct: 70 },
      ];
    },

    get hasQuiz() {
      return this.profile?.neuro_vector && typeof this.profile.neuro_vector === 'object'
             && Object.keys(this.profile.neuro_vector).length > 0;
    },

    get hasInclusivity() {
      return this.profile?.inclusivity_score && typeof this.profile.inclusivity_score === 'object'
             && this.profile.inclusivity_score.overall !== undefined;
    },

    get inclusivityOverall() {
      if (!this.hasInclusivity) return 0;
      return Math.round(this.profile.inclusivity_score.overall * 100);
    },

    get inclusivityCategories() {
      if (!this.hasInclusivity) return [];
      const catLabels = {
        environment: 'Entorno sensorial',
        culture: 'Cultura y comunicacion',
        hiring: 'Procesos de seleccion',
        adaptations: 'Adaptaciones laborales',
        training: 'Formacion',
        metrics: 'Medicion',
      };
      const score = this.profile.inclusivity_score;
      return Object.entries(catLabels)
        .filter(([k]) => score[k] !== undefined)
        .map(([k, label]) => ({ key: k, label, pct: Math.round(score[k] * 100) }));
    },

    get hasGames() {
      return Object.keys(this.gameScores).length > 0;
    },

    get totalPlays() {
      return Object.values(this.gameScores).reduce((s, g) => s + (g.plays || 0), 0);
    },

    progressPct() {
      let steps = 0;
      if (this.profile) steps++;
      if (this.hasQuiz) steps++;
      if (this.hasGames) steps++;
      // future: matching
      return Math.round((steps / 4) * 100);
    },

    async init() {
      await this.$nextTick();

      // Auth recovery
      if (!Alpine.store('auth').isLoggedIn) {
        const saved = localStorage.getItem('diversia_auth');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            Alpine.store('auth').setAuth(data.user, data.token);
          } catch { /* ignore */ }
        }
        if (!Alpine.store('auth').isLoggedIn) {
          window.location.href = '/login';
          return;
        }
      }

      // Admin: load platform stats
      const isAdmin = Alpine.store('auth').role === 'admin';
      if (isAdmin) {
        const [statsResult, jobsAdminResult] = await Promise.allSettled([
          api('/auth/admin/stats'),
          api('/profiles/jobs').catch(() => []),
        ]);
        if (statsResult.status === 'fulfilled') this.adminStats = statsResult.value;
        if (jobsAdminResult.status === 'fulfilled') {
          const jobs = jobsAdminResult.value;
          this.adminJobCount = Array.isArray(jobs) ? jobs.length : 0;
        }
        this.loading = false;
        this.$nextTick(() => {
          // Render charts for the Resumen tab (visible by default)
          this.renderUserDistributionChart();
          this.renderRegistrationTimelineChart();
          this.renderBrainSuiteChart();
          this.renderInclusivityBarChart();
          lucide.createIcons();
        });
        return;
      }

      // Load profile, game scores, matched jobs, conversations, and subscription in parallel
      const userId = Alpine.store('auth').user?.id;
      this.userId = userId || '';
      const [profileResult, scoresResult, jobsResult, subResult, convResult] = await Promise.allSettled([
        api('/profiles/me'),
        api('/profiles/games/scores'),
        api('/profiles/jobs/matched'),
        userId ? api(`/subscriptions/subscriptions/${userId}`).catch(() => null) : Promise.resolve(null),
        api('/profiles/conversations').catch(() => []),
      ]);
      if (profileResult.status === 'fulfilled') this.profile = profileResult.value;

      // Auto-create profile if it doesn't exist yet (first login after registration)
      if (!this.profile && Alpine.store('auth').isLoggedIn) {
        try {
          const user = Alpine.store('auth').user;
          const created = await api('/profiles/', {
            method: 'POST',
            body: JSON.stringify({
              role: user.role || 'candidate',
              display_name: user.display_name || user.email || '',
              bio: '',
            }),
          });
          if (created) this.profile = created;
        } catch (_) { /* profile may already exist — ignore */ }
      }

      if (scoresResult.status === 'fulfilled') this.gameScores = scoresResult.value;
      if (jobsResult.status === 'fulfilled') this.matchedJobs = jobsResult.value || [];
      if (subResult.status === 'fulfilled' && subResult.value) this.subscription = subResult.value;
      if (convResult.status === 'fulfilled') {
        const convs = convResult.value;
        this.recentConversations = Array.isArray(convs) ? convs.slice(0, 3) : [];
      }
      this.loading = false;

      // Process neuro_vector data
      await this.$nextTick();
      if (this.hasQuiz) {
        this.processNeuroVector();
      }
      // Render company inclusivity chart if applicable
      if (this.hasInclusivity) {
        this.$nextTick(() => this.renderCompanyInclusivityChart());
      }
      this.$nextTick(() => lucide.createIcons());
    },

    processNeuroVector() {
      const vec = this.profile.neuro_vector;

      // Sort dimensions by value
      const sorted = Object.entries(vec)
        .map(([key, value]) => ({ key, value: parseFloat(value) }))
        .sort((a, b) => b.value - a.value);

      this.topDimensions = sorted.slice(0, 5);
      this.bottomDimensions = sorted.slice(-3).reverse();

      // Build category data
      this.categories = categoryDefs.map(cat => {
        const dims = cat.keys.map(k => ({ key: k, value: vec[k] || 0 }));
        const avg = dims.reduce((s, d) => s + d.value, 0) / dims.length;
        return { ...cat, dims, avg };
      });

      // Render radar chart
      this.$nextTick(() => this.renderRadarChart(vec));
    },

    renderRadarChart(vec) {
      const canvas = document.getElementById('radarChart');
      if (!canvas) return;

      if (this.radarChart) {
        this.radarChart.destroy();
      }

      const keys = Object.keys(vec);
      const labels = keys.map(k => dimLabels[k] || k);
      const values = keys.map(k => parseFloat(vec[k]));

      const categoryColors = [
        '#3B82F6','#3B82F6','#3B82F6',
        '#6366F1','#6366F1','#6366F1',
        '#06B6D4','#06B6D4','#06B6D4',
        '#10B981','#10B981','#10B981',
        '#EC4899','#EC4899','#EC4899',
        '#F59E0B','#F59E0B','#F59E0B',
        '#8B5CF6','#8B5CF6','#8B5CF6',
        '#EF4444','#EF4444','#EF4444',
      ];

      // Build dimension -> category lookup
      const dimToCategoryMap = {};
      categoryDefs.forEach(cat => {
        cat.keys.forEach(k => { dimToCategoryMap[k] = cat.name; });
      });

      this.radarChart = new Chart(canvas, {
        type: 'radar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Tu perfil 24D',
            data: values,
            backgroundColor: 'rgba(4, 107, 210, 0.15)',
            borderColor: '#046BD2',
            borderWidth: 2,
            pointBackgroundColor: categoryColors.slice(0, keys.length),
            pointBorderColor: '#fff',
            pointBorderWidth: 1,
            pointRadius: 4,
            pointHoverRadius: 7,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: { duration: 800 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleFont: { size: 13, family: 'Rajdhani', weight: 'bold' },
              bodyFont: { size: 12, family: 'Rajdhani' },
              padding: 10,
              cornerRadius: 8,
              callbacks: {
                title: (items) => items[0].label,
                afterTitle: (items) => {
                  const idx = items[0].dataIndex;
                  const dimKey = keys[idx];
                  const category = dimToCategoryMap[dimKey] || '';
                  return category ? `Categoria: ${category}` : '';
                },
                label: (ctx) => {
                  const pct = Math.round(ctx.raw * 100);
                  let level = 'Bajo';
                  if (pct >= 75) level = 'Alto';
                  else if (pct >= 50) level = 'Medio';
                  else if (pct >= 25) level = 'Medio-bajo';
                  return `Valor: ${pct}% (${level})`;
                },
              }
            }
          },
          scales: {
            r: {
              beginAtZero: true,
              max: 1,
              ticks: {
                stepSize: 0.25,
                display: false,
              },
              grid: {
                color: 'rgba(0,0,0,0.06)',
              },
              angleLines: {
                color: 'rgba(0,0,0,0.06)',
              },
              pointLabels: {
                font: { size: 12, family: 'Rajdhani' },
                color: '#374151',
              }
            }
          }
        }
      });
    },

    renderAdminRadarChart() {
      const canvas = document.getElementById('adminRadarChart');
      if (!canvas) return;
      if (this.adminRadarChart) this.adminRadarChart.destroy();

      const keys = Object.keys(demoVector);

      const categoryColors = [

              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleFont: { size: 13, family: 'Rajdhani', weight: 'bold' },
              bodyFont: { size: 12, family: 'Rajdhani' },
              padding: 10,
              cornerRadius: 8,
              callbacks: {
                title: (items) => items[0].label,
                label: (ctx) => {
                  const pct = Math.round(ctx.raw * 100);
                  let level = 'Bajo';
                  if (pct >= 75) level = 'Alto';

                  else if (pct >= 25) level = 'Medio-bajo';

          scales: {
            r: {
              beginAtZero: true,
              max: 1,
              ticks: { stepSize: 0.25, display: false },

    },

    // ── Despacho 2: Graficos interactivos Chart.js (#136) ──

    renderUserDistributionChart() {
      const canvas = document.getElementById('userDistributionChart');
      if (!canvas) return;
      if (this.userDistributionChart) this.userDistributionChart.destroy();

      const candidates = this.adminStats.users?.candidates ?? 0;
      const companies = this.adminStats.users?.companies ?? 0;

      this.userDistributionChart = new Chart(canvas, {

          datasets: [{
            data: [candidates, companies, therapists],
            backgroundColor: ['#046BD2', '#D97706', '#7C3AED'],

        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: { duration: 800, easing: 'easeOutQuart' },

            legend: {
