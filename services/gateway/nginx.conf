events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:8001;
    }

    # upstream profile_service {
    #     server profile-service:8002;
    # }

    # upstream matching_service {
    #     server matching-service:8003;
    # }

    # upstream intelligence_service {
    #     server intelligence-service:8004;
    # }

    server {
        listen 8000;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Auth service
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # TODO: Add routes for other services as they come online
        # location /api/v1/profiles/ { proxy_pass http://profile_service; }
        # location /api/v1/matching/ { proxy_pass http://matching_service; }
        # location /api/v1/ai/       { proxy_pass http://intelligence_service; }
    }
}
