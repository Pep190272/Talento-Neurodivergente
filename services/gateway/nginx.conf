events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=5r/s;

    # Docker DNS resolver — re-resolve on each request
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8000;
        server_name localhost;

        # Hide server version
        server_tokens off;

        # Request size limit
        client_max_body_size 1m;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Auth service — stricter rate limit for brute force protection
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            set $auth_upstream http://auth-service:8001;
            proxy_pass $auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # Matching service
        location /api/v1/matching/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $matching_upstream http://matching-service:8003;
            proxy_pass $matching_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Profile service
        location /api/v1/profiles/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $profile_upstream http://profile-service:8002;
            proxy_pass $profile_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Subscription service
        location /api/v1/subscriptions/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $subscription_upstream http://subscription-service:8005;
            proxy_pass $subscription_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Intelligence service — low rate limit (expensive LLM operations)
        location /api/v1/ai/ {
            limit_req zone=ai_limit burst=10 nodelay;
            set $intel_upstream http://intelligence-service:8004;
            proxy_pass $intel_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Static files (CSS, JS, images) — served by profile-service
        location /static/ {
            set $static_upstream http://profile-service:8002;
            proxy_pass $static_upstream;
            proxy_set_header Host $host;
        }

        # HTML pages — served by profile-service (Jinja2)
        location / {
            set $pages_upstream http://profile-service:8002;
            proxy_pass $pages_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block direct access to internal service docs via gateway
        location ~ ^/(docs|redoc|openapi\.json) {
            return 404;
        }
    }
}
